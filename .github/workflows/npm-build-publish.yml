name: Build & Publish NPM Package

on:
    workflow_call:
        inputs:
            node-version:
                required: false
                type: string
                description: "The version of Node.js to use"
                default: "20"
            working-directory:
                required: false
                type: string
                description: "The working directory containing the npm package to publish"
                default: "."
            npm-repository:
                required: false
                type: string
                description: "The npm repository to publish to"
                default: "https://npm.pkg.github.com/"
            runner:
                required: false
                type: string
                default: "ubuntu-latest"
                description: 'Runner label to execute on. Defaults to GitHub-hosted ubuntu-latest; set to a self-hosted scale-set label (e.g. "arc-runner") to run the publish on self-hosted runners.'

jobs:
    build-and-publish:
        runs-on: ${{ inputs.runner }}
        defaults:
            run:
                working-directory: ${{ inputs.working-directory }}
        permissions:
            contents: read
            packages: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Set up Node.js ${{ inputs.node-version }}
              uses: actions/setup-node@v4
              with:
                  node-version: ${{ inputs.node-version }}
                  cache: "npm"
                  registry-url: ${{ inputs.npm-repository }}

            - name: Extract version from release tag
              id: version
              run: |
                  VERSION="${{ github.event.release.tag_name }}"
                  VERSION="${VERSION#v}"
                  echo "version=$VERSION" >> $GITHUB_OUTPUT

            - name: Verify tag matches package.json version
              run: |
                  PKG_VERSION=$(node -p "require('./package.json').version")
                  if [ "${{ steps.version.outputs.version }}" != "$PKG_VERSION" ]; then
                    echo "::error::Tag version (${{ steps.version.outputs.version }}) does not match package.json ($PKG_VERSION)"
                    echo "::error::Did you forget to run 'changeset version' before tagging?"
                    exit 1
                  fi

            - name: Install dependencies
              run: npm ci --ignore-scripts

            - name: Build package
              run: npm run build

            - name: Determine npm dist-tag
              id: dist-tag
              run: |
                  VERSION="${{ steps.version.outputs.version }}"
                  if [[ "$VERSION" =~ -beta ]]; then
                    echo "tag=beta" >> $GITHUB_OUTPUT
                  elif [[ "$VERSION" =~ -alpha ]]; then
                    echo "tag=alpha" >> $GITHUB_OUTPUT
                  elif [[ "$VERSION" =~ -rc ]]; then
                    echo "tag=rc" >> $GITHUB_OUTPUT
                  else
                    echo "tag=latest" >> $GITHUB_OUTPUT
                  fi

            - name: Publish to npm
              env:
                  NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: npm publish --tag ${{ steps.dist-tag.outputs.tag }}

            - name: Publish summary
              run: |
                  echo "::notice::Published version: ${{ steps.version.outputs.version }} with dist-tag: ${{ steps.dist-tag.outputs.tag }}"

            - name: Troubleshooting hints on failure
              if: failure()
              run: |
                  echo "::error::Publishing failed. Common causes:"
                  echo "::error::1. OIDC authentication issue (check repository.url in package.json)"
                  echo "::error::2. Version already exists in registry"
                  echo "::error::3. Build errors (check 'Build package' step)"
                  echo "::error::4. Tag version does not match package.json version"
