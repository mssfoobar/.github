name: NPM PR Validation

# Reusable PR-validation gate for npm projects following the lazy +
# snapshot release pattern. Runs lint, format-check, typecheck, build,
# test as a server-side mirror of the local pre-commit gate. Each step
# can be opted in/out via inputs.
#
# Companion workflows: changeset-check, npm-snapshot-publish,
# npm-stable-publish.

on:
  workflow_call:
    inputs:
      package-manager:
        required: false
        type: string
        default: 'npm'
        description: 'Package manager — `npm` or `pnpm`. With `pnpm`, the workflow installs pnpm via pnpm/action-setup, uses `pnpm install --frozen-lockfile`, and invokes scripts as `pnpm <script>`. Consumers using `pnpm` MUST either declare `packageManager` in their root `package.json` (e.g. `"packageManager": "pnpm@10.16.1"`) or pass `pnpm-version` below — without one, pnpm/action-setup errors.'
      pnpm-version:
        required: false
        type: string
        default: ''
        description: '(pnpm only) Explicit pnpm version, e.g. `10.16.1`. If empty, pnpm/action-setup resolves the version from `package.json#packageManager`. Ignored for npm.'
      scope:
        required: false
        type: string
        default: ''
        description: 'NPM scope to wire to the GitHub Packages registry, e.g. `@mssfoobar`. When set, `setup-node` writes a user-level `.npmrc` with `<scope>:registry=https://npm.pkg.github.com` and `//npm.pkg.github.com/:_authToken=${NODE_AUTH_TOKEN}`. Required if any install dep (including optional peers pnpm resolves into the lockfile) lives on GitHub Packages and the consumer does not already pin the registry in a checked-in `.npmrc`. Mirrors the publish reusables.'
      node-version:
        required: false
        type: string
        default: '20'
        description: 'Node.js version'
      working-directory:
        required: false
        type: string
        default: '.'
        description: 'Working directory for scripts (use the package directory in single-package repos that keep their package.json outside the root; defaults to repo root for workspaces)'
      cache-dependency-path:
        required: false
        type: string
        default: ''
        description: 'Path to lockfile for setup-node cache key. Defaults to `package-lock.json` for npm and `pnpm-lock.yaml` for pnpm.'
      install-from-root:
        required: false
        type: boolean
        default: true
        description: '(npm only) Run `npm ci` from the repo root (true for workspaces; set false for single-package repos that vendor their lockfile in a subdirectory). Ignored for pnpm — pnpm always installs from root.'
      legacy-peer-deps:
        required: false
        type: boolean
        default: false
        description: '(npm only) Pass `--legacy-peer-deps` to `npm ci`. Ignored for pnpm.'
      run-lint:
        required: false
        type: boolean
        default: false
        description: 'Run `npm run lint` — opt in only if the project defines this script'
      run-format-check:
        required: false
        type: boolean
        default: false
        description: 'Run `npm run format:check` — opt in only if the project defines this script'
      run-typecheck:
        required: false
        type: boolean
        default: true
      run-build:
        required: false
        type: boolean
        default: true
      run-test:
        required: false
        type: boolean
        default: true
      run-audit:
        required: false
        type: boolean
        default: false
        description: '(opt-in) Run `npm audit --omit=dev` / `pnpm audit --prod` after install. Fails the job on any advisory at `audit-severity` or above.'
      audit-severity:
        required: false
        type: string
        default: 'high'
        description: '(audit only) Minimum advisory severity that fails the job: `info`, `low`, `moderate`, `high`, or `critical`. Default `high`.'

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Be self-sufficient about token scope rather than inheriting from the
    # caller. Many consumer workflows don't declare `packages: read` (or run
    # under restricted-default tokens), which would silently 401 the install
    # for any private @org dep. Mirrors the publish reusables.
    permissions:
      contents: read
      packages: read
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate inputs
        working-directory: '.'
        env:
          PM: ${{ inputs.package-manager }}
        run: |
          case "$PM" in
            npm|pnpm) ;;
            *) echo "::error::package-manager must be 'npm' or 'pnpm', got '$PM'"; exit 1 ;;
          esac

      - name: Set up pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Set up Node + GitHub Packages registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ inputs.cache-dependency-path != '' && inputs.cache-dependency-path || (inputs.package-manager == 'pnpm' && 'pnpm-lock.yaml' || 'package-lock.json') }}
          # Wire the GitHub Packages registry for the supplied scope so
          # `NODE_AUTH_TOKEN` resolves at install time. Pairs with the env
          # block on the install steps; one without the other is a no-op.
          registry-url: 'https://npm.pkg.github.com'
          scope: ${{ inputs.scope }}

      - name: Install (npm)
        if: inputs.package-manager == 'npm'
        working-directory: ${{ inputs.install-from-root && '.' || inputs.working-directory }}
        run: npm ci ${{ inputs.legacy-peer-deps && '--legacy-peer-deps' || '' }}
        env:
          # Authenticate against GitHub Packages for private @mssfoobar deps.
          # The publish reusables already export this; PR-validation was
          # missing it. With pnpm + optional peers, fresh CI installs hit
          # ERR_PNPM_FETCH_401 without it (npm escapes today only because
          # `npm ci` doesn't materialize optional peer deps).
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install (pnpm)
        if: inputs.package-manager == 'pnpm'
        working-directory: '.'
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Audit (npm)
        if: inputs.run-audit && inputs.package-manager == 'npm'
        env:
          AUDIT_LEVEL: ${{ inputs.audit-severity }}
        run: npm audit --omit=dev --audit-level="$AUDIT_LEVEL"

      - name: Audit (pnpm)
        if: inputs.run-audit && inputs.package-manager == 'pnpm'
        env:
          AUDIT_LEVEL: ${{ inputs.audit-severity }}
        run: pnpm audit --prod --audit-level "$AUDIT_LEVEL"

      - name: Lint
        if: inputs.run-lint
        run: ${{ inputs.package-manager }} run lint

      - name: Format check
        if: inputs.run-format-check
        run: ${{ inputs.package-manager }} run format:check

      - name: Type check
        if: inputs.run-typecheck
        run: ${{ inputs.package-manager }} run typecheck

      - name: Build
        if: inputs.run-build
        run: ${{ inputs.package-manager }} run build

      - name: Test
        if: inputs.run-test
        run: ${{ inputs.package-manager }} test
