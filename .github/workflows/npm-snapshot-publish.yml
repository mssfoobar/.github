name: NPM Snapshot Publish

# Reusable snapshot publish for the lazy + snapshot release pattern.
# develop → publishes with --tag alpha; */rc → publishes with --tag next.
# cli/package.json (or each workspace's package.json) is mutated
# transiently by `changeset version --snapshot=<id>` and never committed.
#
# Per-package detection: in workspace projects, only packages whose
# version actually changed (because a pending changeset affected them)
# are published. Packages whose version didn't move are skipped — their
# existing registry version remains current.
#
# Manager-specific notes:
#   * npm path enumerates `package.json#workspaces`. The repo root is
#     never included unless `workspaces` is empty (single-package mode).
#   * pnpm path enumerates `pnpm list -r --depth=-1 --json`, which DOES
#     include the workspace root. We rely on the root being `private:
#     true` (the standard convention for a monorepo root) to filter it
#     out. A non-private root would publish — keep your root private.
#   * pnpm publish rewrites `workspace:*` / `workspace:^` deps to
#     concrete versions on the fly; npm publish does not. The publish
#     paths are split partly because of this — don't try to unify them
#     without re-validating against an aoh-web-lib-style workspace.
#
# The snapshot id is `<tag>.<github.run_number>`, producing clean
# sequential versions like `0.1.0-alpha.123` (paired with a changesets
# config that has `prereleaseTemplate: "{tag}"` and
# `useCalculatedVersion: true`).
#
# Auth: plain GITHUB_TOKEN. No PAT or App-token needed because nothing
# pushes back to a protected branch — `cli/package.json`'s git state is
# untouched after the workflow exits.

on:
  workflow_call:
    inputs:
      tag:
        required: true
        type: string
        description: 'Snapshot id prefix and release-script suffix. Use "alpha" for develop pushes, "rc" for */rc pushes.'
      package-manager:
        required: false
        type: string
        default: 'npm'
        description: 'Package manager — `npm` or `pnpm`. With `pnpm`, the workflow installs pnpm via pnpm/action-setup, reads workspace packages via `pnpm list -r --depth=-1 --json`, and publishes via `pnpm --filter "./<path>" publish --no-git-checks` (path-based filter, mirroring the npm path''s `--workspace <path>`). Consumers using `pnpm` MUST either declare `packageManager` in root `package.json` or pass `pnpm-version` below.'
      pnpm-version:
        required: false
        type: string
        default: ''
        description: '(pnpm only) Explicit pnpm version, e.g. `10.16.1`. If empty, pnpm/action-setup resolves the version from `package.json#packageManager`. Ignored for npm.'
      node-version:
        required: false
        type: string
        default: '20'
      scope:
        required: true
        type: string
        description: 'npm scope for GitHub Packages auth (e.g. "@mssfoobar")'
      cache-dependency-path:
        required: false
        type: string
        default: ''
        description: 'Path to lockfile for setup-node cache key. Defaults to `package-lock.json` for npm and `pnpm-lock.yaml` for pnpm.'
      legacy-peer-deps:
        required: false
        type: boolean
        default: false
        description: '(npm only) Pass `--legacy-peer-deps` to `npm ci`. Ignored for pnpm.'
      skip-unchanged-content:
        required: false
        type: boolean
        default: false
        description: 'When true, gate publishing on git content change: only publish a version-moved package when its own dir (or a workspace-dep dir, transitively) changed in github.event.before..HEAD. Avoids republishing packages bumped only by a long-lived pending changeset. Falls back to publishing all version-moved packages when the push base ref is unavailable (workflow_dispatch, first push, or force-push).'
      dry-run:
        required: false
        type: boolean
        default: false
        description: 'When true, log the publish/skip decision per package and publish nothing.'
      runner:
        required: false
        type: string
        default: 'ubuntu-latest'
        description: 'Runner label to execute on. Defaults to GitHub-hosted ubuntu-latest; set to a self-hosted scale-set label (e.g. "arc-runner") to run the publish on self-hosted runners.'

jobs:
  publish:
    name: Publish snapshot (${{ inputs.tag }})
    runs-on: ${{ inputs.runner }}
    timeout-minutes: 10
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate inputs
        env:
          PM: ${{ inputs.package-manager }}
        run: |
          case "$PM" in
            npm|pnpm) ;;
            *) echo "::error::package-manager must be 'npm' or 'pnpm', got '$PM'"; exit 1 ;;
          esac

      - name: Set up pnpm
        if: inputs.package-manager == 'pnpm'
        uses: pnpm/action-setup@v4
        with:
          version: ${{ inputs.pnpm-version }}

      - name: Set up Node + GitHub Packages registry
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: ${{ inputs.package-manager }}
          cache-dependency-path: ${{ inputs.cache-dependency-path != '' && inputs.cache-dependency-path || (inputs.package-manager == 'pnpm' && 'pnpm-lock.yaml' || 'package-lock.json') }}
          registry-url: 'https://npm.pkg.github.com'
          scope: ${{ inputs.scope }}

      - name: Install (npm)
        if: inputs.package-manager == 'npm'
        run: npm ci ${{ inputs.legacy-peer-deps && '--legacy-peer-deps' || '' }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install (pnpm)
        if: inputs.package-manager == 'pnpm'
        run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Snapshot pre-bump versions (npm)
        if: inputs.package-manager == 'npm'
        run: |
          node -e "
            const fs = require('fs');
            const root = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            // Supported: array of literal paths, or absent (single-package mode).
            // Unsupported: glob patterns and the object form. Fail explicitly
            // rather than silently missing packages.
            if (root.workspaces && !Array.isArray(root.workspaces)) {
              throw new Error('Object form of package.json#workspaces is not supported. Use an array of literal workspace paths or migrate to pnpm (package-manager: pnpm).');
            }
            const workspaces = root.workspaces || [];
            for (const p of workspaces) {
              if (typeof p !== 'string') {
                throw new Error('Unsupported entry in package.json#workspaces (' + JSON.stringify(p) + '). Only string paths are supported. Migrate to pnpm (package-manager: pnpm) for richer workspace config.');
              }
              if (p.includes('*')) {
                throw new Error('Glob patterns in package.json#workspaces (\\'' + p + '\\') are not supported. Expand to literal paths, or migrate to pnpm (package-manager: pnpm) and declare globs in pnpm-workspace.yaml.');
              }
            }
            const targets = workspaces.length ? workspaces : ['.'];
            const versions = {};
            for (const ws of targets) {
              const path = ws === '.' ? 'package.json' : ws + '/package.json';
              try {
                const pkg = JSON.parse(fs.readFileSync(path, 'utf8'));
                if (pkg.private) continue;
                versions[pkg.name] = { version: pkg.version, path: ws };
              } catch (e) {
                // Workspace entry without a package.json — skip silently.
              }
            }
            fs.writeFileSync('/tmp/pre-versions.json', JSON.stringify(versions));
            console.log('Pre-bump versions:');
            for (const [name, info] of Object.entries(versions)) {
              console.log('  ' + name + ' @ ' + info.version + ' (' + info.path + ')');
            }
          "

      - name: Snapshot pre-bump versions (pnpm)
        if: inputs.package-manager == 'pnpm'
        run: |
          node -e "
            const fs = require('fs');
            const path = require('path');
            const { execSync } = require('child_process');
            const out = execSync('pnpm list -r --depth=-1 --json', { encoding: 'utf8' });
            let list;
            try {
              list = JSON.parse(out);
            } catch (e) {
              console.error('Failed to parse pnpm list output. First 500 chars:');
              console.error(out.slice(0, 500));
              throw e;
            }
            if (!Array.isArray(list)) {
              throw new Error('pnpm list -r --json did not return an array; got: ' + typeof list);
            }
            const versions = {};
            for (const pkg of list) {
              if (pkg.private) continue;
              const rel = path.relative(process.cwd(), pkg.path) || '.';
              versions[pkg.name] = { version: pkg.version, path: rel };
            }
            fs.writeFileSync('/tmp/pre-versions.json', JSON.stringify(versions));
            console.log('Pre-bump versions:');
            for (const [name, info] of Object.entries(versions)) {
              console.log('  ' + name + ' @ ' + info.version + ' (' + info.path + ')');
            }
          "

      - name: Compute snapshot version
        run: npx changeset version --snapshot=${{ inputs.tag }}.${{ github.run_number }}

      - name: Detect changed packages and publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ inputs.tag }}
          PM: ${{ inputs.package-manager }}
          SKIP_UNCHANGED: ${{ inputs.skip-unchanged-content }}
          DRY_RUN: ${{ inputs.dry-run }}
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          # rc → npm dist-tag "next"; everything else uses tag verbatim
          NPM_TAG=$([ "$TAG" = "rc" ] && echo "next" || echo "$TAG")
          export NPM_TAG

          node -e "
            const fs = require('fs');
            const { execSync } = require('child_process');
            const pre = JSON.parse(fs.readFileSync('/tmp/pre-versions.json', 'utf8'));
            const npmTag = process.env.NPM_TAG;
            const pm = process.env.PM;
            const skipUnchanged = process.env.SKIP_UNCHANGED === 'true';
            const dryRun = process.env.DRY_RUN === 'true';

            // ---- pure helpers (mirror of dev-tested snapshot-gate.mjs) ----
            const underDir = (file, dir) => dir === '.' ? true : file === dir || file.startsWith(dir + '/');
            function computePublishSet(candidates, changedPaths, depGraph) {
              const direct = new Set(candidates.filter(c => changedPaths.some(f => underDir(f, c.path))).map(c => c.name));
              const result = new Set(direct);
              let grew = true;
              while (grew) {
                grew = false;
                for (const c of candidates) {
                  if (result.has(c.name)) continue;
                  if ((depGraph[c.name] || []).some(d => result.has(d))) { result.add(c.name); grew = true; }
                }
              }
              return result;
            }
            function buildDepGraph(candidates) {
              const names = new Set(candidates.map(c => c.name));
              const graph = {};
              for (const c of candidates) {
                let pkg = {};
                const rel = c.path === '.' ? 'package.json' : c.path + '/package.json';
                try { pkg = JSON.parse(execSync('git show HEAD:' + rel, { encoding: 'utf8' })); } catch {}
                const deps = [];
                for (const sect of ['dependencies', 'optionalDependencies']) {
                  for (const [dn, spec] of Object.entries(pkg[sect] || {})) {
                    if (typeof spec === 'string' && spec.startsWith('workspace:') && names.has(dn)) deps.push(dn);
                  }
                }
                graph[c.name] = deps;
              }
              return graph;
            }
            function resolveBase(eventName, baseSha, headSha) {
              if (eventName !== 'push') return null;
              if (!baseSha || /^0+\$/.test(baseSha)) return null;
              try { execSync('git merge-base --is-ancestor ' + baseSha + ' ' + headSha, { stdio: 'ignore' }); }
              catch { return null; }
              return baseSha;
            }

            // ---- candidate set: packages whose version moved (existing logic) ----
            const candidates = [];
            for (const [name, info] of Object.entries(pre)) {
              const pkgPath = info.path === '.' ? 'package.json' : info.path + '/package.json';
              try {
                const pkg = JSON.parse(fs.readFileSync(pkgPath, 'utf8'));
                if (info.version !== pkg.version) candidates.push({ name, path: info.path, oldVersion: info.version, newVersion: pkg.version });
              } catch {}
            }

            // ---- content gate ----
            let toPublish = candidates;
            if (skipUnchanged && candidates.length) {
              const base = resolveBase(process.env.EVENT_NAME, process.env.BASE_SHA, process.env.HEAD_SHA);
              if (base === null) {
                console.log('Content gate: base ref unavailable (' + process.env.EVENT_NAME + ') — publishing all ' + candidates.length + ' version-moved package(s).');
              } else {
                const changedPaths = execSync('git diff --name-only ' + base + ' ' + process.env.HEAD_SHA, { encoding: 'utf8' }).split('\\n').filter(Boolean);
                const keep = computePublishSet(candidates, changedPaths, buildDepGraph(candidates));
                const skipped = candidates.filter(c => !keep.has(c.name));
                toPublish = candidates.filter(c => keep.has(c.name));
                console.log('Content gate (base ' + base.slice(0, 9) + '..' + process.env.HEAD_SHA.slice(0, 9) + '):');
                for (const c of toPublish) console.log('  publish  ' + c.name);
                for (const c of skipped) console.log('  skip     ' + c.name + ' (content unchanged)');
              }
            }

            if (dryRun) {
              console.log('\\n[dry-run] would publish ' + toPublish.length + ' package(s); publishing nothing.');
              process.exit(0);
            }
            if (toPublish.length === 0) { console.log('No packages to publish.'); process.exit(0); }

            console.log('Publishing ' + toPublish.length + ' package(s) with --tag ' + npmTag + ':');
            for (const pkg of toPublish) {
              console.log('  ' + pkg.name + ': ' + pkg.oldVersion + ' → ' + pkg.newVersion);
            }
            for (const pkg of toPublish) {
              let cmd;
              if (pm === 'pnpm') {
                // Path-based filter (mirrors npm's --workspace <path>): unambiguous,
                // immune to scoped-name parsing quirks, no collision if two
                // workspaces ever share a name.
                const filter = pkg.path === '.' ? '.' : './' + pkg.path;
                cmd = 'pnpm --filter \"' + filter + '\" publish --tag ' + npmTag + ' --no-git-checks';
              } else {
                cmd = pkg.path === '.' ? 'npm publish --tag ' + npmTag : 'npm publish --workspace ' + pkg.path + ' --tag ' + npmTag;
              }
              console.log('\\n\$ ' + cmd);
              execSync(cmd, { stdio: 'inherit' });
            }
          "
